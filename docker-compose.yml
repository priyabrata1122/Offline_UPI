version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: upi-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - upi-network

  redis:
    image: redis:alpine
    container_name: upi-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - upi-network

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: upi-server
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - MONGODB_URI=mongodb://mongodb:27017/upi-offline-mesh
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=supersecretjwtkeyforupiofflineportfolioproject
      - JWT_EXPIRES_IN=7d
      - IDEMPOTENCY_TTL_SECONDS=86400
      - PACKET_MAX_AGE_SECONDS=86400
      - NODE_ENV=production
    depends_on:
      - mongodb
      - redis
    networks:
      - upi-network

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: upi-client
    ports:
      - "3000:8"
    depends_on:
      - server
    networks:
      - upi-network

volumes:
  mongo-data:
  redis-data:

networks:
  upi-network:
    driver: bridge
